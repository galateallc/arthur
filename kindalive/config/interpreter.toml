# LLM interpreter configuration.

[llm]
model = "claude-haiku-4-5-20251001"
temperature = 0
max_tokens = 1024

[cache]
enabled = true
max_size = 1000
realtime_ttl = 3600     # 1 hour
background_ttl = 14400  # 4 hours

[fallback]
enabled = true

[routing]
batch_size = 5
flush_interval = 30.0  # seconds

[validation]
max_delta = 0.5
max_duration = 300.0
max_impulses_per_event = 8
